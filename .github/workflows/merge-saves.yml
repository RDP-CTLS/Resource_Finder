# Merge bot: publish editor saves from save/<name> branches into main.
# save/* branches are append-only mailboxes written by an automated upload flow;
# this workflow three-way merges each save and is the ONLY writer of main.
name: Merge editor saves

on:
  push:
    branches:
      - 'save/**'

# Serialize PER BRANCH, not globally. A concurrency group holds at most one running
# run plus one pending run: with a single global group, a third editor saving while
# a merge is in flight silently CANCELS the queued second editor's run, and that save
# is never merged -- no issue, no error, and their page already said "live in a
# minute or two". Per-branch groups keep every editor's save in its own lane; two
# editors' runs may then overlap, which is safe because merge_save.py re-fetches main
# and re-merges on each push attempt (PUSH_ATTEMPTS covers the races).
concurrency:
  group: merge-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

jobs:
  merge:
    # Skip the push that CREATES a save branch. The upload flow makes a missing save/<name>
    # branch by pointing it at main's tip, so that first push carries main's own published
    # file -- which rightly has no _meta.baseRev, because a published file is not a save. The
    # bot read it as an editor save and filed a scary "arrived without a base version" issue
    # against every new editor's first save (issues #2-#6 on 2026-07-14). A branch creation
    # is not a save; there is nothing to merge.
    if: ${{ !github.event.created }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0   # full history: the driver resolves baseRev in main history

      - name: Merge the save into main
        env:
          GH_TOKEN: ${{ github.token }}
          SAVE_BRANCH: ${{ github.ref_name }}
          SAVE_SHA: ${{ github.event.after }}
        run: python3 .github/scripts/merge_save.py
