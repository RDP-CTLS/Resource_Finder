    if(live) live.textContent='Downloaded ctls-data.json and opened the Finder Data library in a new tab. Upload the file there (Upload > Files, choose Replace) to publish.'; }
  /* ---- did the save actually reach the live site? ----
     Writing the local file is NOT proof of publishing. Every direct-save editor
     writes the SAME synced file, so two saves inside one SharePoint sync window can
     collide there -- one version can be overwritten before the flow ever commits it,
     and then no branch, no merge, no issue: the change is simply gone. Clearing the
     local backup on write (as this used to) destroyed the safety net at exactly the
     moment it was needed.

     So: remember what each edit expects to see on the live site, keep the backup
     until we SEE it there, and if it never arrives, say so loudly and keep the work.
     We compare only the fields the editor actually changed, so a merge that folds in
     someone else's edit to a different field of the same card still counts as
     published (it is), rather than raising a false alarm. */
  var sessionExpect={};
  function recordExpectation(prev, store){
    var e=sessionExpect[store.title]||{}, k;
    for(k in store){ if(!Object.prototype.hasOwnProperty.call(store,k)) continue;
      if(JSON.stringify(store[k])!==JSON.stringify(prev?prev[k]:undefined)) e[k]=store[k]; }
    sessionExpect[store.title]=e; }
  // Is every change in `expect` visible on the live site right now?
  function publishedYet(expect){
    expect = expect || sessionExpect;
    var any=false, t0; for(t0 in expect){ if(Object.prototype.hasOwnProperty.call(expect,t0)) any=true; }
    if(!any || !window.fetch) return Promise.resolve(false);
    return fetch('ctls-data.json',{cache:'no-store'})
      .then(function(r){ return r.ok?r.text():null; })
      .then(function(t){
        if(t==null) return false;
        var o; try{ o=JSON.parse(t); }catch(e){ return false; }
        var byT={}; (o.resources||[]).forEach(function(r){ if(r&&r.title) byT[r.title]=r; });
        for(var title in expect){ if(!Object.prototype.hasOwnProperty.call(expect,title)) continue;
          var lr=byT[title]; if(!lr) return false;
          var e=expect[title], k;
          for(k in e){ if(!Object.prototype.hasOwnProperty.call(e,k)) continue;
            if(JSON.stringify(lr[k])!==JSON.stringify(e[k])) return false; } }
        return true; })
      .catch(function(){ return false; }); }
  // GitHub Pages typically redeploys within ~2 min; give it 4 before crying wolf.
  var CONFIRM_TRIES=12, CONFIRM_EVERY=20000;
  function confirmPublish(){
    var n=0;
    function tick(){
      n++;
      publishedYet().then(function(ok){
        if(ok){
          clearPendingLocal(); sessionExpect={};
          if(state.saved) state.saved.sync='ok';
          render({keepScroll:true});
          if(live) live.textContent='Your change is now live on the site.';
          return; }
        if(n<CONFIRM_TRIES){ setTimeout(tick, CONFIRM_EVERY); return; }
        // Never reached the site. Keep the change and the backup; tell them plainly.
        if(state.saved) state.saved.sync='unconfirmed';
        render({keepScroll:true});
        if(live) live.textContent='Your change was saved but has not appeared on the live site. It is still saved here. Do not save again; tell CTLS@rdpolytech.ca.'; });
    }
    setTimeout(tick, CONFIRM_EVERY); }

  // Applied-but-not-published changes are mirrored to localStorage so a closed tab,
  // a crash, or a save that never reaches the site can offer them back next visit.
  var pending=0, LS_KEY='rf-unsent-changes';
  // The expectation rides along with the backup: the confirm loop only lives as long as
  // the tab does, and an editor who saves and immediately closes the tab is the normal
  // case. Without this, their perfectly-published change would still be sitting in the
  // backup next visit and they would be told they had "unfinished changes" and invited
  // to restore and re-save content that is already live.
  function savePendingLocal(){ try{ localStorage.setItem(LS_KEY, JSON.stringify({when:new Date().toISOString(), n:pending, data:payloadJSON(), expect:sessionExpect})); }catch(e){} }
  function clearPendingLocal(){ pending=0; try{ localStorage.removeItem(LS_KEY); }catch(e){} }
  function checkRestore(){ if(!state.edit || pending>0) return;
    try{ var raw=localStorage.getItem(LS_KEY); if(!raw) return; var st=JSON.parse(raw);
      if(st && st.n>0 && st.data) state.restore=st; }catch(e){} }
  // Before offering a restore, make sure it is not already published. Backups written
  // before this existed carry no expectation; those still get offered, as before.
  function dropRestoreIfAlreadyLive(){
    if(!state.restore || !state.restore.expect) return;
    publishedYet(state.restore.expect).then(function(ok){
      if(!ok) return;
      clearPendingLocal(); state.restore=null; render({keepScroll:true});
      if(live) live.textContent='Your last change had already gone live, so there is nothing to restore.'; }); }

  /* ---- direct save into the OneDrive-synced "Finder Data" folder ----
     The SharePoint library is the publish gate: its permissions decide who may
     publish, OneDrive syncs the written file up, and the Power Automate flow
     ("Finder JSON -> GitHub") commits it. The page itself holds no token and
     no endpoint; the write happens through the OS as the signed-in editor.
     File System Access API (Chromium: Edge/Chrome). One picker grant per
     editor; the file handle is remembered in IndexedDB. Everyone else keeps
     the Publish (download + upload) path, which is also the fallback when
     direct save fails for any reason. */
  var FS_OK = typeof window.showSaveFilePicker==='function';
  var saveHandle=null, knownRaws=[];
  function idbOpen(){ return new Promise(function(res,rej){ var r=indexedDB.open('rf-editor',1);
    r.onupgradeneeded=function(){ r.result.createObjectStore('kv'); };
    r.onsuccess=function(){ res(r.result); }; r.onerror=function(){ rej(r.error); }; }); }
  function idbSet(k,v){ return idbOpen().then(function(db){ return new Promise(function(res,rej){
    var tx=db.transaction('kv','readwrite'); tx.objectStore('kv').put(v,k);
    tx.oncomplete=res; tx.onerror=function(){ rej(tx.error); }; }); }); }
  function idbGet(k){ return idbOpen().then(function(db){ return new Promise(function(res,rej){
    var rq=db.transaction('kv').objectStore('kv').get(k); rq.onsuccess=function(){ res(rq.result); }; rq.onerror=function(){ rej(rq.error); }; }); }); }
  function idbDel(k){ return idbOpen().then(function(db){ return new Promise(function(res,rej){
    var tx=db.transaction('kv','readwrite'); tx.objectStore('kv').delete(k);
    tx.oncomplete=res; tx.onerror=function(){ rej(tx.error); }; }); }); }
  function loadSaveHandle(){ if(!FS_OK) return Promise.resolve();
    return idbGet('save-handle').then(function(h){ saveHandle=h||null; }).catch(function(){}); }
  // Published data may have moved on while this page was open (another editor
  // saved). True when the live file matches nothing this session has seen.
  // Compared in canonical form: the Power Automate flow re-serializes the JSON
  // (minified), so byte comparison would flag our own change as foreign. _meta
  // is excluded too: the merge bot bumps rev on every publish, and a rev bump
  // alone is not a foreign content change.
  // Normalize away everything AUTOMATION owns before comparing, so our own publish
  // does not read back as a stranger's. _meta.rev is bumped by the bot on every
  // publish; meta.counts and topics[].resourceCount are recomputed by it too (this
  // page never updates them). Without stripping these, the second save of any
  // session that added or moved a resource would falsely warn "the published data
  // changed while this page was open... saving would overwrite their change".
  function canon(t){ try{ var o=JSON.parse(t); if(!o||typeof o!=='object') return t;
      delete o._meta;
      if(o.meta && typeof o.meta==='object') delete o.meta.counts;
      (o.topics||[]).forEach(function(tp){ if(tp && typeof tp==='object') delete tp.resourceCount; });
      return JSON.stringify(o); }catch(e){ return t; } }
  function liveIsUnknown(){
    if(!window.fetch) return Promise.resolve(false);
    return fetch('ctls-data.json',{cache:'no-store'})
      .then(function(r){ return r.ok?r.text():null; })
      .then(function(t){ return t!=null && knownRaws.indexOf(canon(t))<0; })
      .catch(function(){ return false; }); }
  async function setupDirectSave(){
    // Re-running this any time (via "Change save location") replaces the stored
    // handle, so a save target picked before the folder was synced -- or pointed
    // at the wrong place entirely -- can always be fixed by the editor herself.
    try{
      var opts={suggestedName:'ctls-data.json',
        types:[{description:'JSON data',accept:{'application/json':['.json']}}]};
      // Open the picker where it will do the most good: at the current save
      // location when changing it, otherwise in Documents (where OneDrive puts
      // synced libraries) rather than Downloads.
      opts.startIn = saveHandle || 'documents';
      var h;
      try{ h=await window.showSaveFilePicker(opts); }
      catch(e){ if(e && e.name==='AbortError') throw e;
        delete opts.startIn; h=await window.showSaveFilePicker(opts); }
      // Guard against the classic miss: picking a brand-new file (e.g. in
      // Downloads) instead of the existing ctls-data.json in the synced Finder
      // Data folder. A save-picker target that already has content is the real
      // shared file; a zero-byte one was just created by the picker itself.
      // A brand-new file is zero bytes; but an old ctls-data.json left in Downloads by
      // the retired Publish flow is neither empty nor misnamed, so also require the
      // picked file to actually PARSE as the catalogue. That still cannot tell a stale
      // copy from the synced one (same shape), which is why the name check stays and
      // why "Change save location" exists.
      var badPick='';
      try{
        var f=await h.getFile();
        if(f.size===0) badPick='it is empty, so it is a brand-new file';
        else { var txt=await f.text(); var parsed=JSON.parse(txt);
          if(!parsed || !Array.isArray(parsed.resources)) badPick='it does not look like the catalogue (no resource list inside)'; }
      }catch(e){ badPick='it could not be read as the catalogue ('+((e&&e.name)||'error')+')'; }
      if(badPick || h.name!=='ctls-data.json'){
        if(!confirm('That does not look like the shared ctls-data.json'+(h.name!=='ctls-data.json'?' (you picked "'+h.name+'")':'')+(badPick?':\n\n'+badPick:'')+'.\n\nDirect save only publishes if you select the existing ctls-data.json inside your synced Finder Data folder. Saving anywhere else changes nothing on the live site.\n\nKeep this location anyway?')){
          if(live) live.textContent='Save location not changed. In the SharePoint Finder Data library click Sync first, then choose Change save location and select the existing ctls-data.json in that synced folder.';
          return; } }
      saveHandle=h; try{ await idbSet('save-handle',h); }catch(e){}
      await saveToFolder();
    }catch(e){ if(e && e.name==='AbortError'){ if(live) live.textContent='Direct save was left as it was.'; }
      else { if(live) live.textContent='Direct save setup did not complete. You can try again'+(pubOK()?', or use Publish.':'.'); } }
  }
  async function saveToFolder(){
    if(!saveHandle) return setupDirectSave();
    try{
      var p=await saveHandle.queryPermission({mode:'readwrite'});
      if(p!=='granted') p=await saveHandle.requestPermission({mode:'readwrite'});
      if(p!=='granted'){
        if(state.saved) state.saved.sync='fail';
        render({keepScroll:true});
        if(live) live.textContent='The browser needs permission to write the shared file. Click Save to the shared folder to grant it.';
        return false; }
      if(await liveIsUnknown()){
        if(!confirm('The published data changed while this page was open (another editor likely saved). Saving now would overwrite their change with what you see here. Save anyway?')){
          if(state.saved) state.saved.sync='fail'; render({keepScroll:true}); return false; } }
      var text=JSON.stringify(payloadJSON(),null,1)+'\n';
      var w=await saveHandle.createWritable(); await w.write(text); await w.close();
      knownRaws.push(canon(text));
      // Deliberately NOT clearPendingLocal() here: the file is written, not published.
      // confirmPublish() clears the backup once the change is actually visible live.
      if(state.saved) state.saved.sync='written'; else state.saved={title:null,action:null,sync:'written'};
      render({keepScroll:true});
      if(live) live.textContent='Saved to the shared folder. Checking that it reaches the live site.';
      confirmPublish();
      return true;
    }catch(e){
      // A moved/renamed/deleted target invalidates the remembered handle.
      if(e && (e.name==='NotFoundError'||e.name==='InvalidStateError')){ saveHandle=null; idbDel('save-handle').catch(function(){}); }
      if(state.saved) state.saved.sync='fail';
      render({keepScroll:true});
      if(live) live.textContent='Could not write to the shared folder ('+((e&&e.name)||'error')+'). '+(pubOK()?'Use Publish instead.':'Try Change save location, or tell CTLS@rdpolytech.ca.');
      return false;
    }
  }

  /* ---------- render + events ---------- */

    var bar = staleBar() + (state.edit ? restoreBar()+savedBar()+editBar() : '');
    if(state.view==='topic'){ main.innerHTML=bar+topicView(state.topic); }
    else if(state.view==='task'){ main.innerHTML=bar+taskView(state.task); }
    else { main.innerHTML=bar+teacherShell(); }
    var q=document.getElementById('q'); if(q && q.value!==state.q && document.activeElement!==q){ q.value=state.q; }
    var ai=document.getElementById('aichk'); if(ai){ ai.addEventListener('change',function(){ state.ai=ai.checked; var L=document.getElementById('live'); if(L) L.textContent=state.ai?'AI lens on. Open a topic to see where AI fits in each resource.':'AI lens off.'; paintResults(); }); }
    var ig=document.getElementById('indigchk'); if(ig){ ig.addEventListener('change',function(){ state.indig=ig.checked; var L=document.getElementById('live'); if(L) L.textContent=state.indig?'Indigenization lens on. Open a topic to see where it fits in each resource.':'Indigenization lens off.'; paintResults(); }); }
    var tt = state.view==='topic'&&state.topic ? state.topic+' | ' : state.view==='task'&&taskById(state.task) ? taskById(state.task).label+' | ' : '';
    document.title = tt+'Resource Finder | CTLS';
    if(!(opt&&opt.keepScroll)) window.scrollTo(0,0);
  }
  var searchTimer;
  function onSearch(e){
    if(state.editCtx) return; // the box is hidden while the form is open; belt and braces
    state.q=e.target.value;
    clearTimeout(searchTimer);
    searchTimer=setTimeout(function(){
      var nv = (state.q.trim().length>=2) ? 'search' : (state.view==='search' ? 'home' : state.view);
      var changed = nv!==state.view; state.view = nv;
      if(state.view==='search' || state.view==='home'){
        // Input is in the header, outside #main, so focus survives either path.
        if(document.getElementById('results')){ paintResults(); }

  /* ---------- hash routing ---------- */
  // Every view has a shareable URL: #/topic/<id>, #/task/<id>, #/res/<slug>,
  // #/search/<query>. Click handlers only change the hash; applyHash() is the
  // single renderer, so pasted links, back/forward, and in-app clicks all take
  // the same path. Search-as-you-type uses replaceState so it never floods history.
  function slugify(t){return String(t).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'');}
  // A mangled share link (e.g. a stray "%") must fall back to home, not crash the boot render.
  function safeDecode(s){try{return decodeURIComponent(s);}catch(e){return null;}}
  function resBySlug(sl){for(var i=0;i<D.resources.length;i++){if(slugify(D.resources[i].title)===sl)return D.resources[i];}return null;}
  function topicById(id){for(var i=0;i<D.topics.length;i++){if(D.topics[i].id===id)return D.topics[i];}return null;}
  function nav(hash){ if(location.hash===hash){ applyHash(); } else { location.hash=hash; } }
  function openTopic(name){ var t=topicByName(name); nav(t&&t.id?'#/topic/'+t.id:'#/'); }
  function reveal(title){
    setTimeout(function(){
      var el=main.querySelector('[data-card="'+(window.CSS&&CSS.escape?CSS.escape(title):title.replace(/"/g,'\\"'))+'"]');
      if(el){ el.classList.add('open'); el.scrollIntoView({behavior:'smooth',block:'center'}); el.style.outline='2px solid var(--lime)'; setTimeout(function(){el.style.outline='';},1600); }
    },60);
  }
  function openResource(title){
    var r=byTitle(title); if(!r) return;
    var sel='[data-card="'+(window.CSS&&CSS.escape?CSS.escape(title):title.replace(/"/g,'\\"'))+'"]';
    if(main.querySelector(sel)){
      // Card already on screen (topic or task view): open it in place, and swap
      // the URL quietly so what's on screen is what gets shared.
      if(history.replaceState) history.replaceState(null,'','#/res/'+slugify(title));
      reveal(title);
    } else {
      nav('#/res/'+slugify(title));
    }
  }
  // A link pointed at a card that no longer answers to that name -- almost always a
  // rename, since slugs are derived from titles and the staff SharePoint page is full
  // of these links. A rename usually keeps the front of the title ("...for Learning
  // (UDL)" -> "...for Learning (UDL) v2"), so the renamed card is the one whose slug
  // shares the longest prefix with the dead one. Find it and just open it. Note we
  // cannot search on the slug words: slugs drop punctuation, and search is a plain
  // substring match, so "a process for getting started universal..." never matches the
  // real title "A Process for Getting Started: Universal..." (the colon).
  function closestBySlug(slug){
    var target=String(slug||''), best=null, bestLen=0;
    D.resources.forEach(function(r){
      var s=slugify(r.title||''), n=0;
      while(n<s.length && n<target.length && s.charAt(n)===target.charAt(n)) n++;
      if(n>bestLen){ bestLen=n; best=r; } });
    return bestLen>=10 ? best : null; }   // 10 chars of slug is well past coincidence
  function deadLink(slug, wantEdit){
    if(wantEdit){ state.edit=true; ensureEditParam(); }
    state.editCtx=null;
    var near=closestBySlug(slug);
    if(near){
      state.view='topic'; state.topic=near.topic;
      if(wantEdit){ startEdit(near.title); } else { render(); reveal(near.title); }
      if(live) live.textContent='That link points to an older name for this resource. It is now called "'+near.title+'" -- opened it for you. The link itself is out of date; tell CTLS so it can be refreshed.';
      return; }
    // Nothing close: fall back to a search on the first few words of the slug.
    state.q=String(slug||'').replace(/-+/g,' ').trim().split(/\s+/).slice(0,4).join(' ');
    state.view='search'; render();
    if(live) live.textContent='That link points to a resource that has been renamed or removed. Here are the closest matches.';
    return; }
  function applyHash(){
    var h=location.hash||'', m;
    // Some link renderers (e.g. SharePoint's Markdown web part) percent-encode the
    // "/" in a fragment as %2F, so #/edit/x arrives as #%2Fedit%2Fx. Normalize it back
    // so deep links route the same however they were rendered, shared, or copied.
    h = h.replace(/%2f/gi,'/');
    // Editor deep links (used by the staff SharePoint page). #/edit/<slug> and
    // #/edit/new self-enable edit mode, so those links work without ?edit.
    // ensureEditParam stamps ?edit into the URL so a reload keeps edit mode
    // even after later navigation strips the #/edit hash (finding I).
    if(m=h.match(/^#\/edit\/(.+)/)){ var sl=safeDecode(m[1]);
      if(sl==='new'){ state.edit=true; ensureEditParam(); state.view='home'; state.topic=null; startEdit(null); return; }
      var re=resBySlug(sl); if(re){ state.edit=true; ensureEditParam(); state.view='topic'; state.topic=re.topic; startEdit(re.title); return; }
      // Slugs are derived from titles, so RENAMING a card kills every existing link to
      // it -- and the staff SharePoint page is full of them. Don't dump the editor on
      // the home page wondering what happened: say so, and search for the closest match.
      return deadLink(sl, true); }
    if(m=h.match(/^#\/topic\/([^\/]+)/)){ var t=topicById(safeDecode(m[1])); if(t){ state.editCtx=null; state.view='topic'; state.topic=t.name; render(); return; } }
    if(m=h.match(/^#\/task\/([^\/]+)/)){ var id=safeDecode(m[1]); if(id&&taskById(id)){ state.editCtx=null; state.view='task'; state.task=id; render(); return; } }
    if(m=h.match(/^#\/res\/([^\/]+)/)){ var rsl=safeDecode(m[1]), r=resBySlug(rsl); if(r){
      if(state.edit){ state.view='topic'; state.topic=r.topic; startEdit(r.title); return; }   // in edit mode, open its form
      state.view='topic'; state.topic=r.topic; render(); reveal(r.title); return; }
      return deadLink(rsl, false); }
    if(m=h.match(/^#\/search\/(.+)/)){ var q=safeDecode(m[1]); if(q){ state.editCtx=null; state.q=q; state.view='search'; render(); return; } }
    state.editCtx=null; state.view='home'; state.topic=null; state.task=null; state.q=''; render();
  }
  function ensureEditParam(){ if(!hasEditFlag() && history.replaceState){
    history.replaceState(null,'', location.pathname+(location.search?location.search+'&edit':'?edit')+location.hash); } }
  // Hash navigation (back button, pasted link) while a dirty draft is open asks
  // before discarding; declining restores the URL the form was opened under.
  var suppressHash=false;
  window.addEventListener('hashchange', function(){
    if(suppressHash){ suppressHash=false; return; }
    if(state.editCtx && draftDirty() && !confirm('Leave this card? Your unsaved edits will be discarded.')){
      suppressHash=true; location.hash=(state.editCtx.hash||'#/'); return; }
    applyHash();
  });

  function cancelEdit(){ var tn=state.topic; state.editCtx=null;
    var tp=tn?topicByName(tn):null; if(history.replaceState) history.replaceState(null,'', tp&&tp.id?'#/topic/'+tp.id:'#/');
    render(); }
  document.addEventListener('click',function(e){
    var cp=e.target.closest('[data-copy]'); if(cp){ copyLink(cp.getAttribute('data-copy'), cp); return; }
    // ---- editor actions (checked first; harmless when edit mode is off) ----
    var ec=e.target.closest('[data-edit-card]'); if(ec){ startEdit(ec.getAttribute('data-edit-card')); return; }
    if(e.target.closest('[data-add-res]')){ startEdit(null); return; }
    if(e.target.closest('[data-cancel-edit]')){ if(!confirmDiscard()) return; cancelEdit(); return; }
    if(e.target.closest('[data-apply-edit]')){ applyEdit(); return; }
    if(e.target.closest('[data-publish]')){ publishData(); return; }
    if(e.target.closest('[data-save-folder]')){ saveToFolder(); return; }
    if(e.target.closest('[data-setup-save]')){ setupDirectSave(); return; }
    if(e.target.closest('[data-dismiss-saved]')){ state.saved=null; render({keepScroll:true}); return; }
    if(e.target.closest('[data-restore]')){
      if(pending>0 && !confirm('Restoring will replace the changes you made in this visit. Continue?')) return;
      var st=state.restore; state.restore=null;
      if(st&&st.data){ for(var k in st.data){ if(Object.prototype.hasOwnProperty.call(st.data,k)) D[k]=st.data[k]; } pending=st.n||0; savePendingLocal(); }
      render(); if(live) live.textContent='Earlier changes restored. '+(pubOK()?'Click Publish when you are ready to send them.':'Save to the shared folder when you are ready to send them.'); return; }
    if(e.target.closest('[data-discard-restore]')){ state.restore=null; clearPendingLocal(); render({keepScroll:true}); return; }
    if(e.target.closest('[data-errjump]')){ var eb=document.getElementById('editerrs'); if(eb) eb.scrollIntoView({behavior:'smooth',block:'center'}); return; }
    var ar=e.target.closest('[data-addrow]'); if(ar){ addRow(ar.getAttribute('data-addrow')); return; }
    var dr=e.target.closest('[data-delrow]'); if(dr){ delRow(dr); return; }
    // ---- reader actions ----
    var t=e.target.closest('[data-topic]'); if(t){ openTopic(t.getAttribute('data-topic')); return; }
    var md=e.target.closest('[data-mode]'); if(md){ state.mode=md.getAttribute('data-mode');
      var bs=document.querySelectorAll('.modetab');
      for(var i=0;i<bs.length;i++){ var on=bs[i]===md; bs[i].classList.toggle('on',on); bs[i].setAttribute('aria-pressed',on); }
      paintResults(); return; }
    var tk=e.target.closest('[data-task]'); if(tk){ nav('#/task/'+encodeURIComponent(tk.getAttribute('data-task'))); return; }
    if(e.target.closest('[data-home]')){ nav('#/'); return; }
    var res=e.target.closest('[data-res]'); if(res){ e.preventDefault(); openResource(res.getAttribute('data-res')); return; }
    var ex=e.target.closest('[data-expand]'); if(ex){ var card=ex.closest('.rescard'); card.classList.toggle('open');
      var open=card.classList.contains('open');
      ex.textContent=open?'Show less':'Details & related';
      // Collapsing a tall card can leave the viewport past the card (scroll
      // anchoring jump); pull the card back into view so hover lands sanely.
      if(!open && card.getBoundingClientRect().top<0){ card.scrollIntoView({block:'start'}); }
      return; }
  });
  document.addEventListener('keydown',function(e){
    // In the form, Escape means "cancel this edit" (with a discard check), never "go home".
    if(e.key==='Escape' && state.editCtx){ if(confirmDiscard()) cancelEdit(); return; }
    if(e.key==='Escape'){ var qq=document.getElementById('q'); if(qq&&qq.value){ qq.value=''; state.q=''; }
      if(state.view!=='home'){ nav('#/'); } }
    if(e.key==='/' && !state.editCtx && document.activeElement.tagName!=='INPUT' && document.activeElement.tagName!=='TEXTAREA'){ var q=document.getElementById('q'); if(q){e.preventDefault();q.focus();} }
  });

  // Live preview + validation as the editor types. Only updates the preview and
  // error panel (never the inputs), so the field keeping focus is never rebuilt.
  document.addEventListener('input',function(e){
    if(!state.editCtx) return; var f=currentForm(); if(!f||!f.contains(e.target)) return;
    var d=readDraft(f); state.editCtx.draft=d;
    var pv=document.getElementById('editprev-body'); if(pv) pv.innerHTML=resCard(normalizeForStore(d));
    var errs=validate(d); var box=document.getElementById('editerrs'); if(box) box.innerHTML=errBlock(errs);
    var mini=document.getElementById('editerrs-mini'); if(mini) mini.innerHTML=miniErrs(errs);
    paintFieldErrs(errs);
  });
  // Last line of defence: warn before the tab closes on a dirty draft or
  // applied changes that were never downloaded.
  window.addEventListener('beforeunload',function(e){
    if((state.editCtx && draftDirty()) || pending>0){ e.preventDefault(); e.returnValue=''; }
  });

  // Edit mode is switched on only by opening the page with ?edit in the URL
  // (e.g. from the staff-only SharePoint page of edit links). The plain Finder
  // URL has no ?edit, so readers get zero edit chrome.
  function hasEditFlag(){ return /[?&]edit\b/i.test(location.search||''); }

  // ---------- boot: load data, then wire the shell ----------
  function boot(){
    state.edit = hasEditFlag() && !staleFallback;
    document.getElementById('foot-note').innerHTML='Teaching resources from the <b>Centre of Teaching, Learning &amp; Scholarship</b>, Red Deer Polytechnic. '
      +'Colour-coded blocks inside each card show where the information comes from; teal "outside research" notes were added July 2026 with their sources linked. '
      +'Questions or a resource to suggest? Email <a href="mailto:CTLS@rdpolytech.ca">CTLS@rdpolytech.ca</a>.';
    var qEl=document.getElementById('q'); if(qEl){ qEl.addEventListener('input',onSearch); }
    applyHash();
    // After routing (a #/edit deep link may have just enabled edit mode): offer
    // back any changes applied in an earlier visit but never downloaded, and
    // pick up the remembered direct-save handle so the bars show the right buttons.
    checkRestore(); if(state.restore){ render({keepScroll:true}); dropRestoreIfAlreadyLive(); }
    loadSaveHandle().then(function(){ if(state.edit && saveHandle) render({keepScroll:true}); });
  }
  // Primary source = ctls-data.json (the editable document). If fetch is unavailable
  // (opened as a file://) fall back to window.CTLS from the ctls-data.js script tag.
  // Every raw text this session has seen or written is kept so the pre-save
  // conflict check can tell "someone else published" from "that's ours".
  // ctls-data.js is a snapshot baked in at build time and is NOT republished by the
  // merge bot, so it drifts stale the moment anyone publishes. Falling back to it
  // silently is dangerous in edit mode: the editor would load a stale catalogue,
  // apply a change, and save the whole stale file back over everyone else's work.
  // (The merge bot's baseRev check would reject it, but only after the editor lost
  // their work.) So record when we fall back, and edit mode refuses to run on it.
  var staleFallback=false;
  function loadData(){
    if(!window.fetch){ staleFallback=true; return Promise.resolve(window.CTLS||null); }
    return fetch('ctls-data.json',{cache:'no-store'})
      .then(function(r){ if(!r.ok) throw new Error('http '+r.status); return r.text(); })
      .then(function(t){ knownRaws.push(canon(t)); return JSON.parse(t); })
      .catch(function(){ staleFallback=true; return window.CTLS||null; });
  }
  loadData().then(function(data){
    if(data){ for(var k in data){ if(Object.prototype.hasOwnProperty.call(data,k)) D[k]=data[k]; } }
    ['topics','resources','tasks','glossary','edges'].forEach(function(k){ if(!D[k]) D[k]=[]; });
    boot();
  });
})();
</script>
</body>
</html>
