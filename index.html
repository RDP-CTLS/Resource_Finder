    readTime:(r.readTime==null?'':r.readTime), format:r.format||'', status:r.status||'',
    concepts:(r.concepts||[]).slice(), anchors:(r.anchors||[]).map(function(a){return {label:a.label||'',page:(a.page==null?'':a.page)};}),
    useWhen:(r.useWhen||[]).slice(), poly:r.poly||'', ai:r.ai||'', related:(r.related||[]).slice(),
    research:(r.research||[]).map(function(f){return {fact:f.fact||'',source:f.source||'',url:f.url||''};})
  }; }
  /* ---- draft autosave (pre-Save form state) ----
     A half-filled form used to die with its tab: the localStorage backup only ever
     held APPLIED work, and a dismissable beforeunload was the sole guard on typing.
     Mirror the form draft as she types under its own key family, rf-draft:*,
     entirely separate from rf-unsent-changes: different prefix, different
     lifecycle, and checkRestore()/the restore offer never scan these. Keyed by the
     resource's stable id, so the draft survives a rename made elsewhere. */
  function draftKey(ctx){ if(!ctx) return null;
    if(!ctx.orig) return 'rf-draft:new';
    var r=byTitle(ctx.orig); return 'rf-draft:'+(r&&r.id?r.id:'title:'+ctx.orig); }
  var draftTimer=null;
  function saveDraftLocal(){ var ctx=state.editCtx; if(!ctx) return;
    try{
      if(JSON.stringify(normalizeForStore(ctx.draft))===ctx.base) return;   // untouched: nothing worth keeping
      localStorage.setItem(draftKey(ctx), JSON.stringify({when:new Date().toISOString(), orig:ctx.orig, draft:ctx.draft}));
    }catch(e){} }
  function clearDraftLocal(ctx){ clearTimeout(draftTimer);
    try{ var k=draftKey(ctx||state.editCtx); if(k) localStorage.removeItem(k); }catch(e){} }
  // Old drafts are noise, not treasure: drop anything past two weeks, keep ten at most.
  function pruneDrafts(){ try{
    var rows=[]; for(var i=0;i<localStorage.length;i++){ var k=localStorage.key(i);
      if(k&&k.indexOf('rf-draft:')===0){ var v=null; try{ v=JSON.parse(localStorage.getItem(k)); }catch(e){}
        rows.push({k:k, when:(v&&v.when)||''}); } }
    var cutoff=new Date(Date.now()-14*86400000).toISOString();
    var alive=[];
    rows.forEach(function(r){ if(!r.when||r.when<cutoff){ localStorage.removeItem(r.k); } else alive.push(r); });
    alive.sort(function(a,b){ return a.when<b.when?1:-1; })
      .slice(10).forEach(function(r){ localStorage.removeItem(r.k); });
  }catch(e){} }
  function startEdit(orig){ var r=orig?byTitle(orig):null; var draft=r?cloneRes(r):blankRes();
    // base = the normalized starting point, so we can tell a dirty draft from an untouched one
    state.editCtx={orig:orig||null, draft:draft, base:JSON.stringify(normalizeForStore(draft)), hash:location.hash};
    // Unsaved typing from an earlier visit to this same form? Offer it back, in
    // the form itself, and only when it still differs from the card as it stands.
    try{ var praw=localStorage.getItem(draftKey(state.editCtx));
      if(praw){ var pd=JSON.parse(praw);
        if(pd && pd.draft && JSON.stringify(normalizeForStore(pd.draft))!==state.editCtx.base) state.editCtx.offer=pd;
        else localStorage.removeItem(draftKey(state.editCtx)); }   // already the same: spent
    }catch(e){}
    render();
    // The pencil that opened this form no longer exists (the whole main column was
    // replaced), so without a hand-off, focus silently resets to <body> and a screen
    // reader goes quiet. Land it on the form's heading instead.
    var h=document.getElementById('ef-head'); if(h) h.focus({preventScroll:true}); }
  function currentForm(){ return document.getElementById('editform'); }
  function syncDraftFromForm(){ var f=currentForm(); if(f&&state.editCtx){ state.editCtx.draft=readDraft(f); } }
  function draftDirty(){ if(!state.editCtx) return false; syncDraftFromForm();
    return JSON.stringify(normalizeForStore(state.editCtx.draft))!==state.editCtx.base; }
  /* One in-page question, replacing window.confirm. A native <dialog> gives the
     focus trap, Escape handling and focus-return-to-invoker for free; the buttons
     are the toolbar's own. Rules: the SAFE choice is the first button and takes
     initial focus; Escape means the safe choice; `danger` fills the risky button
     in the warn pink. Everything funnels through the close event, so a click, an
     Escape and a programmatic close all settle the promise exactly once.
     (beforeunload stays native: browsers ignore custom UI there.)
     title/body are trusted internal strings; anything dynamic is escaped at the
     call site. Button labels are escaped here. */
  var askEl=null, askBusy=false;
  function ask(o){
    if(askBusy){
      // A question is already on screen: answer no. But if the dialog is not
      // actually open, the previous question died without settling (something
      // closed it out from under us) -- free the lock rather than leaving every
      // guarded action on the page dead until a reload.
      if(askEl && !askEl.open){ askBusy=false; }
      else return Promise.resolve(false); }
    if(!askEl){ askEl=document.createElement('dialog'); askEl.className='askdlg'; document.body.appendChild(askEl); }
    if(typeof askEl.showModal!=='function')      // no <dialog> support: fall back to native
      return Promise.resolve(confirm(o.title+(o.body?'\n\n'+String(o.body).replace(/<[^>]+>/g,''):'')));
    askBusy=true;
    askEl.innerHTML='<h2 id="ask-title">'+o.title+'</h2>'
      +(o.body?'<p>'+o.body+'</p>':'')
      +'<div class="askrow"><button class="ebtn ghost" type="button" data-ask="no">'+esc(o.no)+'</button>'
      +'<button class="ebtn '+(o.danger?'danger':'primary')+'" type="button" data-ask="yes">'+esc(o.yes)+'</button></div>';
    askEl.setAttribute('aria-labelledby','ask-title');
    return new Promise(function(res){
      // Everything funnels through settle(), driven by plain click/keydown --
      // not by the dialog's own close/cancel events, which are kept only as
      // fallbacks (they proved unreliable under automation, and a promise that
      // never settles silently wedges every guarded action on the page).
      var settled=false;
      function settle(v){ if(settled) return; settled=true;
        askEl.removeEventListener('click',onClick); askEl.removeEventListener('keydown',onKey);
        askEl.removeEventListener('cancel',onCancel); askEl.removeEventListener('close',onClose);
        askBusy=false;
        if(askEl.open) askEl.close();   // also returns focus to the invoker
        res(v); }
      function onClick(e){ var b=e.target.closest('[data-ask]'); if(b) settle(b.getAttribute('data-ask')==='yes'); }
      function onKey(e){ if(e.key==='Escape'){ e.stopPropagation(); settle(false); } }
      function onCancel(){ settle(false); }
      function onClose(){ settle(false); }
      askEl.addEventListener('click',onClick);
      askEl.addEventListener('keydown',onKey);
      askEl.addEventListener('cancel',onCancel);
      askEl.addEventListener('close',onClose);
      askEl.showModal();
      var safe=askEl.querySelector('[data-ask="no"]'); if(safe) safe.focus();
    }); }
  function confirmDiscard(){ if(!draftDirty()) return Promise.resolve(true);
    return ask({title:'Discard your edits to this card?', body:'What you typed here will be thrown away.',
      no:'Keep editing', yes:'Discard the edits', danger:true}); }

  // ---- field builders ----
  function fInput(f,label,val,o){ o=o||{}; return '<div class="field'+(o.req?' req':'')+'"><label for="ef-'+f+'">'+esc(label)+(o.help?' <span class="help">'+esc(o.help)+'</span>':'')+'</label>'
    +'<input id="ef-'+f+'" type="'+(o.type||'text')+'" data-field="'+f+'" value="'+esc(val==null?'':val)+'"'+(o.req?' aria-required="true"':'')+(o.attr||'')+'></div>'; }
  function fTextarea(f,label,val,o){ o=o||{}; return '<div class="field'+(o.req?' req':'')+'"><label for="ef-'+f+'">'+esc(label)+(o.help?' <span class="help">'+esc(o.help)+'</span>':'')+'</label>'
    +'<textarea id="ef-'+f+'" data-field="'+f+'"'+(o.req?' aria-required="true"':'')+'>'+esc(val||'')+'</textarea></div>'; }
  function fSelect(f,label,val,options){ var o=options.map(function(op){return '<option value="'+esc(op.v)+'"'+(op.v===(val||'')?' selected':'')+'>'+esc(op.t)+'</option>';}).join('');
    return '<div class="field"><label for="ef-'+f+'">'+esc(label)+'</label><select id="ef-'+f+'" data-field="'+f+'">'+o+'</select></div>'; }
  function fSimpleList(name,label,help,vals){ var rows=(vals&&vals.length?vals:['']).map(function(v){return '<div class="listrow" data-row><input type="text" data-cell="v" aria-label="'+esc(label)+'" value="'+esc(v||'')+'"><button class="delrow" type="button" data-delrow aria-label="Remove this line">&times;</button></div>';}).join('');
    return '<div class="field"><label>'+esc(label)+(help?' <span class="help">'+esc(help)+'</span>':'')+'</label><div data-list="'+name+'">'+rows+'</div><button class="addrow" type="button" data-addrow="'+name+'">+ Add</button>'+undoBtn(name)+'</div>'; }
  function anchorRow(a){ a=a||{}; return '<div class="listrow" data-row><input type="text" data-cell="label" aria-label="Jump link label" placeholder="Label (e.g. The rubric grid)" value="'+esc(a.label||'')+'"><input type="number" min="1" class="pagecell" data-cell="page" aria-label="Page number" placeholder="Page" value="'+esc(a.page==null?'':a.page)+'"><button class="delrow" type="button" data-delrow aria-label="Remove this jump link">&times;</button></div>'; }
  function fAnchors(vals){ var rows=(vals&&vals.length?vals:[]).map(anchorRow).join('');
    return '<div class="field"><label>Jump-to page links <span class="help">a label + the page it starts on, a mini table of contents into the PDF</span></label><div data-list="anchors">'+rows+'</div><button class="addrow" type="button" data-addrow="anchors">+ Add a jump link</button>'+undoBtn('anchors')+'</div>'; }
  function researchNote(f,i){ f=f||{}; return '<div class="notecard" data-row>'
    +'<div class="nhead"><span class="nlab">Note '+(i+1)+'</span><button class="delnote" type="button" data-delrow>&times; Remove note</button></div>'
    +'<input type="text" data-cell="fact" aria-label="The fact or finding" placeholder="The fact or finding" value="'+esc(f.fact||'')+'">'
    +'<div class="nrow"><input type="text" data-cell="source" aria-label="Source name" placeholder="Source name" value="'+esc(f.source||'')+'">'
    +'<input type="url" data-cell="url" aria-label="Citation link, starts with https://" placeholder="https:// citation link" value="'+esc(f.url||'')+'"></div></div>'; }
  function fResearch(vals){ var rows=(vals&&vals.length?vals:[]).map(researchNote).join('');
    return '<div class="field"><label>Research notes <span class="help">every fact must carry a citation URL, that is the rule</span></label><div data-list="research">'+rows+'</div><button class="addrow" type="button" data-addrow="research">+ Add a research note</button>'+undoBtn('research')+'</div>'; }
  // The related grid, separated from fRelated so the filter can rebuild the grid
  // alone: the filter input itself is never rebuilt (the focused-input rule), and
  // a TICKED box always renders whatever the filter says -- a filter that could
  // hide a selection would silently drop it from the next readDraft().
  function relGridHTML(current, flt, orig){
    var cur={}; (current||[]).forEach(function(t){cur[t]=1;});
    var all=D.resources.filter(function(r){return r.title!==orig;});
    var shown=all.filter(function(r){ return cur[r.title] || !flt || r.title.toLowerCase().indexOf(flt)>=0; });
    var boxes=shown.map(function(r){ return '<label><input type="checkbox" data-relcheck value="'+esc(r.title)+'"'+(cur[r.title]?' checked':'')+'> '+esc(r.title)+'</label>'; }).join('');
    return {html: boxes||'<span class="help">'+(flt?'Nothing matches that.':'No other resources yet.')+'</span>', n:shown.length, total:all.length}; }
  function fRelated(current){ var orig=state.editCtx&&state.editCtx.orig;
    var fltRaw=(state.editCtx&&state.editCtx.relFilter)||'';
    var g=relGridHTML(current, fltRaw.trim().toLowerCase(), orig);
    return '<div class="field"><label>Related resources <span class="help">tick the ones a reader should see next</span></label>'
     +'<input type="search" data-relfilter autocomplete="off" aria-label="Filter this list by name" placeholder="Type to shorten the list" value="'+esc(fltRaw)+'">'
     +'<div class="relgrid" data-list="related">'+g.html+'</div>'
     +'<span class="help" data-relcount role="status">'+(fltRaw.trim()?g.n+' of '+g.total+' shown &middot; ticked ones always stay':'')+'</span></div>'; }

  // ---- read the whole draft back out of the DOM (rows kept unfiltered so add/remove stays index-stable) ----
  function readDraft(form){
    function g(f){ var el=form.querySelector('[data-field="'+f+'"]'); return el?el.value:''; }
    function simple(name){ return [].map.call(form.querySelectorAll('[data-list="'+name+'"] [data-row]'),function(row){ var i=row.querySelector('[data-cell="v"]'); return i?i.value:''; }); }
    var anchors=[].map.call(form.querySelectorAll('[data-list="anchors"] [data-row]'),function(row){ var l=row.querySelector('[data-cell="label"]'),p=row.querySelector('[data-cell="page"]'); return {label:l?l.value:'',page:p?p.value:''}; });
    var research=[].map.call(form.querySelectorAll('[data-list="research"] [data-row]'),function(row){ function c(k){var el=row.querySelector('[data-cell="'+k+'"]');return el?el.value:'';} return {fact:c('fact'),source:c('source'),url:c('url')}; });
    var related=[].map.call(form.querySelectorAll('[data-relcheck]:checked'),function(c){return c.value;});
    return {title:g('title'),topic:g('topic'),oneLine:g('oneLine'),url:g('url'),readTime:g('readTime'),format:g('format'),status:g('status'),
      concepts:simple('concepts'),anchors:anchors,useWhen:simple('useWhen'),poly:g('poly'),ai:g('ai'),related:related,research:research}; }

  // ---- normalize a draft into the stored/rendered resource shape (drops empties, coerces numbers) ----
  function normalizeForStore(d){
    var out={title:(d.title||'').trim(),topic:d.topic||'',oneLine:(d.oneLine||'').trim(),url:(d.url||'').trim()};
    if(nonEmpty(d.readTime)){ var n=parseInt(d.readTime,10); out.readTime=isNaN(n)?String(d.readTime).trim():n; }
    if(nonEmpty(d.format)) out.format=d.format.trim();
    if(nonEmpty(d.status)) out.status=d.status;
    var cs=(d.concepts||[]).map(function(v){return String(v).trim();}).filter(nonEmpty); if(cs.length) out.concepts=cs;
    var an=(d.anchors||[]).filter(function(a){return nonEmpty(a.label)||nonEmpty(a.page);}).map(function(a){var p=parseInt(a.page,10);return {label:String(a.label).trim(),page:isNaN(p)?a.page:p};}); if(an.length) out.anchors=an;
    var uw=(d.useWhen||[]).map(function(v){return String(v).trim();}).filter(nonEmpty); if(uw.length) out.useWhen=uw;
    if(nonEmpty(d.poly)) out.poly=d.poly.trim();
    if(nonEmpty(d.ai)) out.ai=d.ai.trim();
    if((d.related||[]).length) out.related=d.related.slice();
    var rs=(d.research||[]).filter(function(f){return nonEmpty(f.fact)||nonEmpty(f.source)||nonEmpty(f.url);}).map(function(f){return {fact:String(f.fact).trim(),source:String(f.source).trim(),url:String(f.url).trim()};}); if(rs.length) out.research=rs;
    return out; }

  // ---- validation (each error carries the field it belongs to, when it has one) ----
  function validate(d){
    var e=[]; var orig=state.editCtx&&state.editCtx.orig;
    function E(m,f){ e.push({m:m,f:f||null}); }
    if(!nonEmpty(d.title)) E('Title is required.','title');
    if(!nonEmpty(d.topic)) E('Choose a topic.','topic');
    if(!nonEmpty(d.oneLine)) E('A one-line summary is required.','oneLine');
    if(!nonEmpty(d.url)) E('The PDF link (URL) is required.','url');
    else if(!/^https?:\/\//i.test(d.url.trim())) E('The PDF link must start with http:// or https://','url');
    if(nonEmpty(d.title)){
      var clash=D.resources.filter(function(r){return r.title===d.title.trim() && r.title!==orig;});
      if(clash.length) E('Another resource already has that title.','title');
      else{ var sl=slugify(d.title); var near=D.resources.filter(function(r){return r.title!==orig && slugify(r.title)===sl;});
        if(near.length) E('That title is too close to "'+near[0].title+'" (they would share the same web address). Make it more distinct.','title'); }
    }
    (d.anchors||[]).forEach(function(a){ if(nonEmpty(a.label) && !(parseInt(a.page,10)>=1)) E('Jump link "'+a.label.trim()+'" needs a page number of 1 or more.'); });
    (d.research||[]).forEach(function(f,i){ if(nonEmpty(f.fact)||nonEmpty(f.source)||nonEmpty(f.url)){
      if(!nonEmpty(f.fact)) E('Research note '+(i+1)+' needs the fact text.');
      if(!nonEmpty(f.url)) E('Research note '+(i+1)+' needs a citation URL (no uncited research).');
      else if(!/^https?:\/\//i.test(f.url.trim())) E('Research note '+(i+1)+' citation URL must start with http:// or https://'); } });
    return e; }
  function errBlock(errs){ return errs.length?'<div class="editerrs"><b>Fix these before saving:</b><ul>'+errs.map(function(er){return '<li>'+esc(er.m)+'</li>';}).join('')+'</ul></div>':''; }
  function miniErrs(errs){ if(!errs.length) return '';
    return (errs.length===1?'1 thing to fix':errs.length+' things to fix')+' &middot; <button class="errjump" type="button" data-errjump>see the list</button>'; }
  // Inline messages under the four keyed fields; adds/removes only the small .ferr
  // divs, so the inputs themselves are never rebuilt while typing.
  function paintFieldErrs(errs){
    ['title','topic','oneLine','url'].forEach(function(f){
      var el=document.getElementById('ef-'+f); if(!el) return;
      var fld=el.closest('.field'); if(!fld) return;
      var old=fld.querySelector('.ferr'); if(old) old.parentNode.removeChild(old);
      var mine=errs.filter(function(er){return er.f===f;});
      fld.classList.toggle('haserr', !!mine.length);
      if(mine.length){ var dv=document.createElement('div'); dv.className='ferr'; dv.id='ef-'+f+'-err'; dv.textContent=mine[0].m;
        fld.appendChild(dv); el.setAttribute('aria-describedby','ef-'+f+'-err'); }
      else el.removeAttribute('aria-describedby');
    }); }

  // ---- the form view (takes over the main column while editing) ----
  // At wide viewports the preview docks sticky in a right column so it stays
  // visible while typing anywhere in the form; on narrow screens it sits on top.
  // Offer back unsaved typing from an earlier visit to this same form. Deliberately
  // says "what you typed", never "changes": that word belongs to the restore bar,
  // which offers back APPLIED work, and the two nets must not read as one.
  function draftOfferBar(){
    var offer=state.editCtx && state.editCtx.offer; if(!offer) return '';
    var when=''; try{ if(offer.when){ when=' on '+new Date(offer.when).toLocaleString(undefined,{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); } }catch(e){}
    return '<div class="restorebar"><p class="msg"><b>You were '+(state.editCtx.orig?'editing this card':'adding this resource')+when+' and did not save.</b> Bring back what you typed?</p>'
     +'<button class="ebtn primary" type="button" data-draft-back>Bring it back</button>'
     +'<button class="ebtn ghost" type="button" data-draft-fresh>Start fresh</button></div>'; }
  // The preview builds from the NORMALIZED draft, so two perfectly normal
  // mid-authoring states vanish from it without a word: jump links do not render
  // until the PDF URL is a real link, and a research note without its fact shows
  // as an empty line. Say so under the preview; stay silent otherwise.
  function previewGaps(d){
    var out=[];
    var hasAnchor=(d.anchors||[]).some(function(a){return nonEmpty(a.label)||nonEmpty(a.page);});
    if(hasAnchor && !/^https?:\/\//i.test(String(d.url||'').trim()))
      out.push('Your jump links will appear here once the PDF link is filled in.');
    if((d.research||[]).some(function(n){return !nonEmpty(n.fact) && (nonEmpty(n.source)||nonEmpty(n.url));}))
      out.push('A research note has no fact yet, so it shows as an empty line.');
    return out.join(' '); }
  function editFormView(){
    var d=state.editCtx.draft, orig=state.editCtx.orig, errs=validate(d);
    return '<button class="back" type="button" data-cancel-edit>'+icon('dot',12)+' Cancel</button>'
     +'<div class="fhead"><div class="eyebrow">'+(orig?'Editing a resource':'New resource')+'</div><h2 id="ef-head" tabindex="-1">'+esc(orig||'New resource')+'</h2>'
       +'<p class="fhint">Fields are grouped by where the information comes from, the same colours as the cards. Starred fields are required.</p></div>'
     +draftOfferBar()
     +'<div class="editcols">'
     +'<div class="editprev"><div class="pvlab">Live preview (how the card will look)</div><div id="editprev-body">'+resCard(normalizeForStore(d))+'</div>'
       +'<p class="pvgap" id="editprev-gaps">'+esc(previewGaps(d))+'</p></div>'
     +'<form class="editform" id="editform" onsubmit="return false">'
     +'<div id="editerrs">'+errBlock(errs)+'</div>'
     +'<div class="efgroup identity"><div class="gt">The basics</div>'+fInput('title','Title',d.title,{req:true})+fSelect('topic','Topic',d.topic,D.topics.map(function(t){return {v:t.name,t:t.name};}))+'</div>'
     +'<div class="efgroup res"><div class="gt">From the resource <span class="prov res">purple</span></div><p class="gsub">Summarized from the PDF itself.</p>'
       +fTextarea('oneLine','One-line summary',d.oneLine,{req:true,help:'the sentence under the title'})
       +fInput('url','PDF link (URL)',d.url,{req:true,type:'url',help:'starts with https://'})
       +fInput('readTime','Read time (minutes)',d.readTime,{type:'number',attr:' min="1"'})
       +fInput('format','Format',d.format,{help:'e.g. Guide, Checklist, Worksheet'})
       +fSelect('status','Status chip',d.status,STATUS_OPTS)
       +fSimpleList('concepts','Key points ("What’s inside")','the main points, one per line',d.concepts)
       +fAnchors(d.anchors)+'</div>'
     +'<div class="efgroup ctls"><div class="gt">CTLS context <span class="prov ctls">green</span></div><p class="gsub">Written by the CTLS team for RDP.</p>'
       +fSimpleList('useWhen','"Use this when..." moments','the situations a teacher reaches for this',d.useWhen)
       +fTextarea('poly','Polytechnic angle',d.poly)
       +fTextarea('ai','Where AI fits',d.ai,{help:'shown when a reader turns the AI lens on'})
       +fRelated(d.related)+'</div>'
     +'<div class="efgroup ext"><div class="gt">Outside research <span class="prov ext">teal</span></div><p class="gsub">Published research. Every fact carries its citation.</p>'
       +fResearch(d.research)+'</div>'
     +'<div class="editactions">'
       +'<button class="ebtn primary" type="button" data-apply-edit>Save</button>'
       +'<button class="ebtn ghost" type="button" data-cancel-edit>Cancel</button>'
       +'<span class="errline" id="editerrs-mini">'+miniErrs(errs)+'</span>'
       // This note used to say "nothing goes public until it is saved to the shared
       // Finder Data folder" no matter what, which is false for anyone set up: applyEdit
       // calls saveToFolder and the change is on its way to the public site. Telling an
       // editor her half-finished card is private at the exact moment she commits it is
       // the worst lie in the interface, and it is why editors go hunting for a second
       // Save button that does not need to exist. So read the same flag applyEdit reads.
       +'<span class="note">'+((FS_OK&&saveHandle)
          ? 'Saving publishes this card. It goes live on the site about a minute later.'
          : 'Saving keeps this on your screen only. Nothing is public until publishing is turned on.')+'</span>'
     +'</div></form></div>'; }

  // Publishing has two tiers. Direct save (below) writes straight into the
  // OneDrive-synced Finder Data folder for whoever has set it up once.
  // Everyone else -- and direct save itself, if it ever fails -- falls back
  // to Publish: download the file and open the Finder Data SharePoint library
  // in the same click, so the next step (Upload > Files, Replace) is right
  // there. The actual write happens inside that already-authenticated
  // SharePoint tab, so nothing about identity needs to travel from this page.
  var PUBLISH_URL='https://rdcca.sharepoint.com/sites/ctl-resources/Finder%20Data/Forms/AllItems.aspx';
  // Publish UI is parked while direct save is under test (2026-07-10). All the
  // machinery (publishData, PUBLISH_URL, the data-publish handler) stays wired;
  // flip this to true to bring the buttons back. Browsers without the File
  // System Access API (Safari/Firefox) still get Publish regardless, since
  // direct save cannot exist there and Publish is their only path.
  var PUBLISH_UI=false;
  function pubOK(){ return PUBLISH_UI || !FS_OK; }

  /* ---- one verb: Save ----
     Saving a card publishes it. That is the whole model, and it is what the code has
     always actually done (applyEdit calls saveToFolder for anyone set up). The old bar
     asked an editor to hold four separate ideas -- a draft, a page-local "apply", a
     folder write and a publish -- three of which are our plumbing, not her job.

     Two rules hold this together:
       1. STATE lives in a chip. It is never dismissible and it never lies.
       2. ACTIONS appear only when they are the right action. A save button that must
          not be pressed is not on screen at all. The old bar lit a purple "Save to the
          shared folder" the whole time a save was in flight, which is exactly the
          window where a second write can lose the first (see confirmPublish's note),
          and it stayed lit under an alert that read "please do not save again". */
  function stateChip(){
    var sync = state.saved && state.saved.sync;
    var n = pending+' change'+(pending===1?'':'s');
    if(pending>0 && (sync==='trying'||sync==='written')) return '<span class="statechip busy">Publishing '+n+'&hellip;</span>';
    if(sync==='unconfirmed') return '<span class="statechip stuck">'+n+' not live</span>';
    if(sync==='fail')        return '<span class="statechip stuck">'+n+' not saved</span>';
    if(pending>0)            return '<span class="statechip stuck">'+n+' not published yet</span>';
    return '<span class="statechip live">All changes are live</span>'; }

  function editBar(){
    var sync = state.saved && state.saved.sync;
    if(FS_OK&&saveHandle){
      // A save button earns its place only when a save genuinely has not happened.
      // Never while one is in flight ('trying'/'written'), and never in 'unconfirmed',
      // where the copy is asking her to keep her hands still.
      var needsSave = pending>0 && (!sync || sync==='fail');
      return '<div class="editbar">'
       +'<div class="ebhead"><p class="t"><b>Edit mode.</b> Click <b>&#9998; Edit</b> on any card. Saving a card puts it on the live site about a minute later.</p>'+stateChip()+'</div>'
       +'<div class="ebrow"><button class="ebtn primary" type="button" data-add-res>+ Add a resource</button>'
       +(needsSave?'<button class="ebtn primary" type="button" data-save-folder>'+(sync==='fail'?'Try saving again':'Save these changes')+'</button>':'')
       +'</div>'
       +'<p class="ebset">Publishing from your Finder Data folder. <button class="ebtn link" type="button" data-setup-save>Change where it saves</button></p>'
       +'</div>'; }
    if(pubOK())
      return '<div class="editbar">'
       +'<div class="ebhead"><p class="t"><b>Edit mode.</b> Click <b>&#9998; Edit</b> on any card. This browser cannot publish on its own, so when you are done click <b>Publish</b>: it downloads your changes and opens the Finder Data library to upload them to.</p>'+stateChip()+'</div>'
       +'<div class="ebrow"><button class="ebtn primary" type="button" data-add-res>+ Add a resource</button>'
       +(pending>0?'<button class="ebtn primary" type="button" data-publish>Publish</button>':'')
       +'</div></div>';
    return '<div class="editbar">'
     +'<div class="ebhead"><p class="t"><b>Edit mode.</b> Click <b>&#9998; Edit</b> on any card. Before anything can go live, publishing needs turning on once <b>on this computer</b>. (Each computer is set up separately. Doing it here does not undo it anywhere else.)</p>'+stateChip()+'</div>'
     +'<div class="ebrow"><button class="ebtn primary" type="button" data-setup-save>Turn on publishing (one time)</button>'
     +'<button class="ebtn ghost" type="button" data-add-res>+ Add a resource</button>'
     +'</div></div>'; }

  /* Post-save message. Prose only: every action lives in editBar, so a screen reader
     never hears the same button name twice on one screen.
     Dismiss hides THIS message, not the fact underneath it. The old Dismiss set
     state.saved = null, which silently disarmed confirmPublish (both its outcomes are
     guarded on state.saved), so the one warning that tells an editor her work is stuck
     could be switched off by tidying away an unrelated success banner. */
  function savedBar(){
    if(!state.saved) return '';
    var sync = state.saved.sync;
    // Dismissals are recorded as String(sync): sync is legitimately null when a card
    // is saved on the page but publishing is not set up here, and a null-to-null
    // match against the "nothing dismissed" marker hid that message before it ever
    // showed (its two branches below were unreachable).
    if(state.savedSeen===String(sync)) return '';   // dismissed, and nothing has changed since
    var what = state.saved.title ? '"'+esc(state.saved.title)+'" '+state.saved.action : 'Your change is saved';
    var dis = '<button class="ebtn ghost" type="button" data-dismiss-saved>Dismiss</button>';
    if(sync==='trying'){
      // 'queued': a colleague's save is sitting in the synced file, not yet live.
      // Ours waits its turn (see fileHoldsUnpublished) -- from her side that is
      // still just "publishing", so the chip stays busy and the bar explains why
      // it is taking a moment. No action exists, so no button appears.
      if(state.saved.why==='queued')
        return '<div class="savedbar"><p class="msg"><b>A colleague&#39;s change is going live first.</b> Yours is saved here and will follow on its own in a minute or two. Nothing to do.</p></div>';
      return '<div class="savedbar"><p class="msg">'+what+'. Saving&hellip;</p></div>'; }
    if(sync==='written')
      return '<div class="savedbar"><p class="msg"><b>'+what+'.</b> Publishing now: it should be live in a minute or two. You can keep editing, and closing the tab is fine. We will pick the check back up next time you open the editor.</p></div>';
    if(sync==='unconfirmed')
      return '<div class="savedbar warn"><p class="msg"><b>&#9888; Your work is safe, but it is not live yet.</b> We waited four minutes and it has not reached the site. Nothing is lost: it is held in this browser on this computer, and it will be offered back next time you open the editor here. <b>Do not save it again</b>, because a second copy makes it harder to sort out. Email <a href="mailto:CTLS@rdpolytech.ca?subject=Resource%20Finder%3A%20a%20change%20has%20not%20gone%20live">CTLS@rdpolytech.ca</a> and say which card you edited, and we will finish it for you.</p>'+dis+'</div>';
    if(sync==='ok')
      return '<div class="savedbar"><p class="msg"><b>'+what+'.</b> It is now <b>live on the site</b>. Nothing else to do.</p>'+dis+'</div>';
    if(sync==='fail'){
      // One cause, one remedy. The old bar collapsed every failure into one message
      // whose loudest fix was "change the save location" -- which reopens the picker,
      // the door to the wrong-file trap, for failures that had nothing to do with the
      // location. `why` is set where each failure is caught; the handle check stays
      // as the fallback because a lost handle also sends editBar back to its
      // "Turn on publishing" branch, and the message must point at a button that is
      // actually on the screen.
      var why = state.saved.why || (!(FS_OK && saveHandle) ? 'lost' : 'write');
      var mail = ' If it keeps failing, email <a href="mailto:CTLS@rdpolytech.ca">CTLS@rdpolytech.ca</a>.';
      if(why==='queued')
        return '<div class="savedbar warn"><p class="msg"><b>A colleague&#39;s change is still on its way to the live site</b>, so this card was not saved over it. Your change is safe here and backed up. Wait a few minutes, then click <b>Try saving again</b>.'+' If it keeps happening, email <a href="mailto:CTLS@rdpolytech.ca">CTLS@rdpolytech.ca</a>.</p>'+dis+'</div>';
      if(why==='permission')

  async function setupDirectSave(){

    // handle, so a save target picked before the folder was synced -- or pointed
    // at the wrong place entirely -- can always be fixed by the editor herself.
    try{
      /* MUST be showOpenFilePicker, never showSaveFilePicker. A save picker TRUNCATES the
         file it is pointed at the moment the editor confirms it -- so doing this setup
         correctly (selecting the real synced ctls-data.json) emptied the shared catalogue
         before a single byte of ours was written, and OneDrive dutifully synced the
         emptiness up. It cost us two live incidents on 2026-07-14. An open picker asks for
         readwrite access to an EXISTING file and touches nothing. */
      var opts={multiple:false,
        types:[{description:'JSON data',accept:{'application/json':['.json']}}]};
      // Open the picker where it will do the most good: at the current save
      // location when changing it, otherwise in Documents (where OneDrive puts
      // synced libraries) rather than Downloads.
      opts.startIn = saveHandle || 'documents';
      var h;
      try{ h=(await window.showOpenFilePicker(opts))[0]; }
      catch(e){ if(e && e.name==='AbortError') throw e;

      // prompt fails here (with a clear message) rather than at the first real save.
      var perm=await h.queryPermission({mode:'readwrite'});
      if(perm!=='granted') perm=await h.requestPermission({mode:'readwrite'});
      if(perm!=='granted'){
        if(live) live.textContent='The browser needs your permission to save to that file. Run Set up direct save again and choose Allow when it asks.';
        return; }
      /* Guard against the classic miss: pointing this at something that is not the synced
         shared file. Everything then LOOKS fine forever -- we write, we report "saved", and
         the live site never changes.

         The old checks were shape-only (not empty, parses, has a resources list, named
         ctls-data.json) and its own comment conceded they "cannot tell a stale copy from the
         synced one". They cannot, but we can: a stale ctls-data.json in Downloads -- left by
         the retired Publish flow, under exactly that name -- is an OLDER VERSION of the same
         document, and every version is stamped. So compare it with what we are serving:

           - canon-identical to the live file  -> this IS the shared file. Silent pass.
           - carries an older _meta.rev        -> an old copy. Name the two versions.
           - no _meta.rev at all               -> not the catalogue we publish (the offline
                                                  fallback carries none, by design).
           - same rev, different content       -> not the file the site is serving.

         file still matches the live one even though the bot has rewritten parts of it. */
      var badPick='';

        var f=await h.getFile();

        else {
          var txt=await f.text(), parsed=JSON.parse(txt);
          if(!parsed || !Array.isArray(parsed.resources)) badPick='there is no resource list inside, so it is not the catalogue';
          else if(knownRaws.indexOf(canon(txt))<0){
            var theirRev=(parsed._meta||{}).rev, ourRev=(D._meta||{}).rev;
            if(typeof theirRev!=='number') badPick='it has no version stamp, so it is not the file the site publishes from';
            else if(typeof ourRev==='number' && theirRev<ourRev)

        // not the five-paragraph native confirm this used to be.
        var reason=badPick||'it is not named ctls-data.json';
        var keep=await ask({title:'That is not the shared catalogue file',
          body:(h.name!=='ctls-data.json'?'You picked <b>'+esc(h.name)+'</b>. ':'')
            +esc(reason.charAt(0).toUpperCase()+reason.slice(1))+'.<br><br>'

          no:'Pick a different file', yes:'Keep this file anyway', danger:true});
        if(!keep){
          if(live) live.textContent='Nothing changed. Pick the ctls-data.json inside your synced Finder Data folder. If that folder is not on this computer yet, open the Finder Data library in SharePoint and click Sync first, or email CTLS@rdpolytech.ca for help.';
          return; } }

      // publish pipeline for no change, and start a publish check with no expectation, which
      // can only end in the false "it never reached the site" alarm. Only save real work.
      // (Safe to skip the write now that the picker no longer truncates -- see above. If the
      // file we were handed IS empty, we never get here: the guard sends her back.)
      if(pending>0){ await saveToFolder(); return; }
      render({keepScroll:true});

      else { if(live) live.textContent='Direct save setup did not complete. You can try again'+(pubOK()?', or use Publish.':'.'); } }
  }
  async function saveToFolder(){
    if(!saveHandle) return setupDirectSave();
    // Nothing to save. Writing anyway would re-trigger the whole publish pipeline for no
    // change, and start a publish check with no expectation, which can only end in the false
    // "it never reached the site" alarm.
    if(pending===0){ if(live) live.textContent='Everything is saved already. There is nothing waiting to go live.'; return true; }
    try{
      var p=await saveHandle.queryPermission({mode:'readwrite'});
      if(p!=='granted') p=await saveHandle.requestPermission({mode:'readwrite'});
      if(p!=='granted'){
        if(state.saved){ state.saved.sync='fail'; state.saved.why='permission'; }
        else state.saved={title:null,action:null,sync:'fail',why:'permission'};
        render({keepScroll:true});
        if(live) live.textContent='The browser needs your permission to save the file. Click Try saving again, and choose Allow.';
        return false; }
      // Never write over a colleague's not-yet-published save (see the note on
      // fileHoldsUnpublished). No dialog: there is no decision for the editor to
      // make, only a short wait the page handles itself.
      if(await fileHoldsUnpublished()){ queueSave(); return false; }
      var text=JSON.stringify(payloadJSON(),null,1)+'\n';
      var w=await saveHandle.createWritable(); await w.write(text); await w.close();
      knownRaws.push(canon(text));
      // Deliberately NOT clearPendingLocal() here: the file is written, not published.
      // confirmPublish() clears the backup once the change is actually visible live.
      if(state.saved){ state.saved.sync='written'; delete state.saved.why; }
      else state.saved={title:null,action:null,sync:'written'};
      render({keepScroll:true});
      if(live) live.textContent='Saved. Publishing now, and checking that it reaches the live site.';
      confirmPublish();
      return true;
    }catch(e){
      // A moved/renamed/deleted target invalidates the remembered handle.
      var lostH = e && (e.name==='NotFoundError'||e.name==='InvalidStateError');
      if(lostH){ saveHandle=null; idbDel('save-handle').catch(function(){}); }
      if(state.saved){ state.saved.sync='fail'; state.saved.why=lostH?'lost':'write'; }
      else state.saved={title:null,action:null,sync:'fail',why:lostH?'lost':'write'};
      render({keepScroll:true});
      // The exception name is for us, not for her. Log it; say something she can act on.
      if(window.console&&console.warn) console.warn('saveToFolder failed:', e);
      if(live) live.textContent='Publishing did not work, but your change is safe on this page. '+(pubOK()?'Use Publish instead.':'Click Try saving again. If it keeps failing, email CTLS@rdpolytech.ca.');
      return false;
    }
  }

  // substring match, so "a process for getting started universal..." never matches the

    var back = orig ? main.querySelector('[data-edit-card="'+(window.CSS&&CSS.escape?CSS.escape(orig):orig.replace(/"/g,'\\"'))+'"]') : null;
    if(!back) back = main.querySelector('[data-add-res]');
    if(back) back.focus(); }
  document.addEventListener('click',function(e){
    var cp=e.target.closest('[data-copy]'); if(cp){ copyLink(cp.getAttribute('data-copy'), cp); return; }
    var od=e.target.closest('[data-open-dead]'); if(od){ var dt=od.getAttribute('data-open-dead'), dr=byTitle(dt);
      if(dr){ state.dead=null; state.view='res'; state.res=dt; if(history.replaceState&&dr.id) history.replaceState(null,'','#/r/'+dr.id); render(); } return; }
    var tg=e.target.closest('[data-topic-id]'); if(tg){ nav('#/topic/'+tg.getAttribute('data-topic-id')); return; }
    // ---- editor actions (checked first; harmless when edit mode is off) ----
    var ec=e.target.closest('[data-edit-card]'); if(ec){ startEdit(ec.getAttribute('data-edit-card')); return; }
    if(e.target.closest('[data-add-res]')){ startEdit(null); return; }
    if(e.target.closest('[data-cancel-edit]')){ confirmDiscard().then(function(ok){ if(ok) cancelEdit(); }); return; }
    if(e.target.closest('[data-draft-back]')){ var dctx=state.editCtx;
      if(dctx && dctx.offer && dctx.offer.draft){ dctx.draft=dctx.offer.draft; dctx.offer=null; render();
        var dh=document.getElementById('ef-head'); if(dh) dh.focus({preventScroll:true});
        if(live) live.textContent='What you typed before is back in the form.'; }
      return; }
    if(e.target.closest('[data-draft-fresh]')){ var fctx=state.editCtx;
      if(fctx){ clearDraftLocal(fctx); fctx.offer=null; render({keepScroll:true}); }
      return; }
    if(e.target.closest('[data-apply-edit]')){ applyEdit(); return; }
    if(e.target.closest('[data-publish]')){ publishData(); return; }
    if(e.target.closest('[data-save-folder]')){ saveToFolder(); return; }
    if(e.target.closest('[data-setup-save]')){ setupDirectSave(); return; }
    // Dismiss hides the MESSAGE, never the state. Setting state.saved=null (as this used to)
    // also disarmed confirmPublish, whose outcomes are both guarded on state.saved existing:
    // tidying away a success banner could permanently suppress the later warning that the
    // work never went live. Record which message was dismissed; a change of state re-shows it.
    if(e.target.closest('[data-dismiss-saved]')){ state.savedSeen = state.saved ? String(state.saved.sync) : null; render({keepScroll:true}); return; }
    if(e.target.closest('[data-restore]')){
      var doRestore=function(){
        var st=state.restore; state.restore=null;
        if(st&&st.data){ for(var k in st.data){ if(Object.prototype.hasOwnProperty.call(st.data,k)) D[k]=st.data[k]; } pending=st.n||0;
          // Carry the expectation back too. Without it the restored work has nothing to check
          // against, so its publish check could only ever end in the false "not live" alarm.
          if(st.expect) sessionExpect=st.expect;
          savePendingLocal(); }
        render(); if(live) live.textContent='Those changes are back on the page. Save them when you are ready.'; };
      if(pending>0){ ask({title:'Bring back the older changes?',
        body:'This replaces the changes you have made this visit with the ones from your last visit.',
        no:'Keep what I have now', yes:'Replace with the older changes'}).then(function(ok){ if(ok) doRestore(); }); return; }
      doRestore(); return; }
    // Discards the OFFER. Since applyEdit now parks an unanswered offer under its own key,
    // this button can only be reached before anything has been applied this visit, so the
    // backup and the offer are the same thing. The guard keeps that true if that ever changes.
    if(e.target.closest('[data-discard-restore]')){
      ask({title:'Throw those changes away?', body:'They cannot be brought back.',
        no:'Keep them', yes:'Throw them away', danger:true}).then(function(ok){
          if(!ok) return;
          state.restore=null;
          if(pending===0) clearPendingLocal(); else { try{ localStorage.removeItem(LS_PREV); }catch(e2){} }
          render({keepScroll:true}); });
      return; }
    if(e.target.closest('[data-errjump]')){ var eb=document.getElementById('editerrs'); if(eb) eb.scrollIntoView({behavior:'smooth',block:'center'}); return; }
    var ar=e.target.closest('[data-addrow]'); if(ar){ addRow(ar.getAttribute('data-addrow')); return; }
    var dr=e.target.closest('[data-delrow]'); if(dr){ delRow(dr); return; }
    if(e.target.closest('[data-undodel]')){ undoDelRow(); return; }
    // ---- reader actions ----
    var t=e.target.closest('[data-topic]'); if(t){ openTopic(t.getAttribute('data-topic')); return; }
    var md=e.target.closest('[data-mode]'); if(md){ state.mode=md.getAttribute('data-mode');
      var bs=document.querySelectorAll('.modetab');
      for(var i=0;i<bs.length;i++){ var on=bs[i]===md; bs[i].classList.toggle('on',on); bs[i].setAttribute('aria-pressed',on); }
      paintResults(); return; }
    var tk=e.target.closest('[data-task]'); if(tk){ nav('#/task/'+encodeURIComponent(tk.getAttribute('data-task'))); return; }
    if(e.target.closest('[data-home]')){ nav('#/'); return; }
    var res=e.target.closest('[data-res]'); if(res){ e.preventDefault(); openResource(res.getAttribute('data-res')); return; }
    var ex=e.target.closest('[data-expand]'); if(ex){ var card=ex.closest('.rescard'); card.classList.toggle('open');
      var open=card.classList.contains('open');
      ex.textContent=open?'Show less':'Details & related';
      // Collapsing a tall card can leave the viewport past the card (scroll
      // anchoring jump); pull the card back into view so hover lands sanely.
      if(!open && card.getBoundingClientRect().top<0){ card.scrollIntoView({block:'start'}); }
      return; }
  });
  document.addEventListener('keydown',function(e){
    // In the form, Escape means "cancel this edit" (with a discard check), never "go home".
    // While the question dialog is open, Escape belongs to the dialog (ask() is
    // re-entry-guarded, so this call resolves false and nothing moves).
    if(e.key==='Escape' && state.editCtx){ confirmDiscard().then(function(ok){ if(ok) cancelEdit(); }); return; }
    if(e.key==='Escape'){ var qq=document.getElementById('q'); if(qq&&qq.value){ qq.value=''; state.q=''; }
      if(document.activeElement && document.activeElement.closest && document.activeElement.closest('.copyfall')) return;
      if(state.view!=='home'){ nav('#/'); } }
    if(e.key==='/' && !state.editCtx && document.activeElement.tagName!=='INPUT' && document.activeElement.tagName!=='TEXTAREA'){ var q=document.getElementById('q'); if(q){e.preventDefault();q.focus();} }
  });

  // Live preview + validation as the editor types. Only updates the preview and
  // error panel (never the inputs), so the field keeping focus is never rebuilt.
  document.addEventListener('input',function(e){
    if(!state.editCtx) return; var f=currentForm(); if(!f||!f.contains(e.target)) return;
    // The related-list filter narrows the grid and touches nothing else -- it is
    // display state, not draft content, so it must not run the draft rebuild.
    if(e.target.hasAttribute && e.target.hasAttribute('data-relfilter')){
      state.editCtx.relFilter=e.target.value;
      var fld=e.target.closest('.field');
      if(fld){ var g=relGridHTML((state.editCtx.draft.related)||[], e.target.value.trim().toLowerCase(), state.editCtx.orig);
        fld.querySelector('.relgrid').innerHTML=g.html;
        var cnt=fld.querySelector('[data-relcount]');
        if(cnt) cnt.innerHTML=e.target.value.trim()?g.n+' of '+g.total+' shown &middot; ticked ones always stay':''; }
      return; }
    var d=readDraft(f); state.editCtx.draft=d;
    var pv=document.getElementById('editprev-body'); if(pv) pv.innerHTML=resCard(normalizeForStore(d));
    var pg=document.getElementById('editprev-gaps'); if(pg) pg.textContent=previewGaps(d);
    var errs=validate(d); var box=document.getElementById('editerrs'); if(box) box.innerHTML=errBlock(errs);
    var mini=document.getElementById('editerrs-mini'); if(mini) mini.innerHTML=miniErrs(errs);
    paintFieldErrs(errs);
    // Mirror the typing to its rf-draft backup, debounced a beat behind her hands.
    clearTimeout(draftTimer); draftTimer=setTimeout(saveDraftLocal, 900);
  });
  // Last line of defence: warn before the tab closes on a dirty draft, or on work that has
  // not been written anywhere yet.
  // Do NOT warn once the file is written ('written'/'ok'): the save has happened, the publish
  // runs without us, and the backup is held until it is seen live. The bar tells her closing
  // the tab is fine, so the browser must not then tell her it is not.
  window.addEventListener('beforeunload',function(e){
    var sync = state.saved && state.saved.sync;
    var settled = sync==='written' || sync==='ok';
    if((state.editCtx && draftDirty()) || (pending>0 && !settled)){ e.preventDefault(); e.returnValue=''; }
  });

  // Edit mode is switched on only by opening the page with ?edit in the URL
  // (e.g. from the staff-only SharePoint page of edit links). The plain Finder
  // URL has no ?edit, so readers get zero edit chrome.
  function hasEditFlag(){ return /[?&]edit\b/i.test(location.search||''); }

  /* ---- dev-only state gallery ----
     Open with ?gallery to see every editor bar, banner and chip state rendered
     side by side with mocked module state. Most of these states need a synced
     folder, a picker grant or a mid-flight publish to reach for real, so a
     review in a plain browser session sees only a sliver of the surface; this
     page is the rest of it. Nothing in the UI links here and no reader URL
     carries the flag. Pure string rendering: boot() hands over to it before any
     wiring, it never fetches or touches storage, and every mock is restored. */
  function hasGalleryFlag(){ return /[?&]gallery\b/i.test(location.search||''); }
  function renderGallery(){
    var _p=pending,_h=saveHandle,_fs=FS_OK,_pu=PUBLISH_UI,_sv=state.saved,_ss=state.savedSeen,
        _rs=state.restore,_st=staleFallback,_dd=state.dead,_ef=hasEditFlag,_ec=state.editCtx;
    function base(){ pending=0; saveHandle=null; FS_OK=true; PUBLISH_UI=false; state.saved=null;
      state.savedSeen=null; state.restore=null; state.dead=null; staleFallback=false; state.editCtx=null; }
    function withMocks(set, capture){
      var out='';
      try{ set(); out=capture?capture():staleBar()+restoreBar()+deadBanner()+savedBar()+editBar(); }
      catch(e){ out='<p>render failed: '+esc(e&&e.message)+'</p>'; }
      pending=_p; saveHandle=_h; FS_OK=_fs; PUBLISH_UI=_pu; state.saved=_sv; state.savedSeen=_ss;
      state.restore=_rs; staleFallback=_st; state.dead=_dd; hasEditFlag=_ef; state.editCtx=_ec;
      return out; }
    var H={mock:true};   // handle stand-in: outside a save only its truthiness is read
    var card='Rubrics: Purposes and Rationale';
    var SCEN=[
      ['Setup needed (fresh browser, nothing set up)', function(){ base(); }],
      ['Setup needed, with a change already applied', function(){ base(); pending=1; state.saved={title:card,action:'updated',sync:null}; }],
      ['Resting (set up, everything live)', function(){ base(); saveHandle=H; }],
      ['Changes waiting (brought back from an earlier visit)', function(){ base(); saveHandle=H; pending=2; }],
      ['Saving', function(){ base(); saveHandle=H; pending=1; state.saved={title:card,action:'updated',sync:'trying'}; }],
      ["Waiting behind a colleague's in-flight save (queued)", function(){ base(); saveHandle=H; pending=1; state.saved={title:card,action:'updated',sync:'trying',why:'queued'}; }],
      ['Written, publishing now', function(){ base(); saveHandle=H; pending=1; state.saved={title:card,action:'updated',sync:'written'}; }],
      ['Live on the site', function(){ base(); saveHandle=H; state.saved={title:card,action:'updated',sync:'ok'}; }],
      ['Not live after four minutes (unconfirmed)', function(){ base(); saveHandle=H; pending=1; state.saved={title:card,action:'updated',sync:'unconfirmed'}; }],
      ['Save failed: browser permission', function(){ base(); saveHandle=H; pending=1; state.saved={title:card,action:'updated',sync:'fail',why:'permission'}; }],
      ['Save failed: lost track of the file', function(){ base(); pending=1; state.saved={title:card,action:'updated',sync:'fail',why:'lost'}; }],
      ['Save failed: write error', function(){ base(); saveHandle=H; pending=1; state.saved={title:card,action:'updated',sync:'fail',why:'write'}; }],
      ["Save failed: colleague's save never landed (queued timeout)", function(){ base(); saveHandle=H; pending=1; state.saved={title:card,action:'updated',sync:'fail',why:'queued'}; }],
      ['Offer from a previous visit (restore)', function(){ base(); saveHandle=H; state.restore={when:'2026-07-12T21:15:00Z',n:2}; }],
      ['Offline copy (reader)', function(){ base(); staleFallback=true; }],
      ['Offline copy (arrived on an edit link)', function(){ base(); staleFallback=true; hasEditFlag=function(){return true;}; }],
      ['No direct save in this browser (Safari/Firefox), changes pending', function(){ base(); FS_OK=false; pending=1; state.saved={title:card,action:'updated',sync:null}; }],
      ['Dead share link, close match found', function(){ base(); state.dead={slug:'blooms-cognitive-domain', near:(D.resources[0]||{}).title||null}; }],
      ['Dead share link, no match', function(){ base(); state.dead={slug:'retired-resource-name', near:null}; }]
    ];
    var html='<div style="max-width:1100px;margin:0 auto;padding:1rem 1rem 3rem;">'
      +'<h1 style="font-size:1.3rem;">Editor state gallery</h1>'
      +'<p style="margin:.3rem 0 1rem;">Every bar, banner and chip state the editor can show, rendered with mocked state. Dev-only (<code>?gallery</code>); the buttons here are inert.</p>';
    SCEN.forEach(function(s){ html+='<h2 style="margin:1.8rem 0 .5rem;font-size:.95rem;">'+esc(s[0])+'</h2>'+withMocks(s[1]); });
    // ---- form-level pieces (draft offer, undo, preview hints) ----
    html+='<h2 style="margin:2.4rem 0 .5rem;font-size:.95rem;">Draft offer (unsaved typing from an earlier visit)</h2>'
      +withMocks(function(){ base(); state.editCtx={orig:card, offer:{when:'2026-07-12T21:15:00Z'}}; },
        function(){ return draftOfferBar(); })
      +'<h2 style="margin:1.8rem 0 .5rem;font-size:.95rem;">Row-delete undo (sits beside the list&#39;s Add button)</h2>'
      +withMocks(function(){ base(); state.editCtx={lastDel:{list:'concepts',idx:0,value:''}}; },
        function(){ return '<button class="addrow" type="button">+ Add</button>'+undoBtn('concepts'); })
      +'<h2 style="margin:1.8rem 0 .5rem;font-size:.95rem;">Preview gap hints</h2>'
      +'<p class="pvgap">'+esc(previewGaps({anchors:[{label:'Intro',page:1}],url:'',research:[]}))+'</p>'
      +'<p class="pvgap">'+esc(previewGaps({anchors:[],url:'https://example.com',research:[{fact:'',source:'A source',url:'https://example.com'}]}))+'</p>';
    // ---- question dialogs (rendered in-flow, not modal, so they all show at once) ----
    html+='<h2 style="margin:2.4rem 0 .5rem;font-size:.95rem;">Question dialogs</h2>';
    [['Discard your edits to this card?','What you typed here will be thrown away.','Keep editing','Discard the edits',true],
     ['Leave this card?','Your edits here have not been saved and will be thrown away.','Stay here','Leave and discard',true],
     ['Bring back the older changes?','This replaces the changes you have made this visit with the ones from your last visit.','Keep what I have now','Replace with the older changes',false],
     ['Throw those changes away?','They cannot be brought back.','Keep them','Throw them away',true],
     ['That is not the shared catalogue file','You picked <b>ctls-data (3).json</b>. It is an older copy. It is version 8, and the site is on version 10. Most likely it is a leftover download rather than the synced file.<br><br>If you keep it, nothing you save will ever reach the live site.','Pick a different file','Keep this file anyway',true]
    ].forEach(function(q){
      html+='<dialog class="askdlg" open style="position:static;margin:.6rem 0;">'
        +'<h2 style="font-size:1rem;margin:0 0 .35rem;">'+q[0]+'</h2><p>'+q[1]+'</p>'
        +'<div class="askrow"><button class="ebtn ghost" type="button">'+q[2]+'</button>'
        +'<button class="ebtn '+(q[4]?'danger':'primary')+'" type="button">'+q[3]+'</button></div></dialog>';
    });
    html+='</div>';
    document.body.classList.add('edit-on');
    main.innerHTML=html;
    document.title='Editor state gallery';
    // The app's real click handler is already wired on document; swallow clicks
    // in capture so the mock buttons cannot trigger pickers, saves or navigation.
    main.addEventListener('click',function(e){ var b=e.target.closest('button,a'); if(b){ e.preventDefault(); e.stopPropagation(); } },true);
  }

  // ---------- boot: load data, then wire the shell ----------
  function boot(){
    if(hasGalleryFlag()){ renderGallery(); return; }
    state.edit = hasEditFlag() && !staleFallback;
    document.getElementById('foot-note').innerHTML='Teaching resources from the <b>Centre of Teaching, Learning &amp; Scholarship</b>, Red Deer Polytechnic. '
      +'Colour-coded blocks inside each card show where the information comes from; teal "outside research" notes were added July 2026 with their sources linked. '
      +'Questions or a resource to suggest? Email <a href="mailto:CTLS@rdpolytech.ca">CTLS@rdpolytech.ca</a>.';
    var qEl=document.getElementById('q'); if(qEl){ qEl.addEventListener('input',onSearch); }
    applyHash();
    // After routing (a #/edit deep link may have just enabled edit mode): offer
    // back any changes applied in an earlier visit but never downloaded, and
    // pick up the remembered direct-save handle so the bars show the right buttons.
    checkRestore(); if(state.restore){ render({keepScroll:true}); dropRestoreIfAlreadyLive(); }
    if(state.edit) pruneDrafts();
    loadSaveHandle().then(function(){ if(state.edit && saveHandle) render({keepScroll:true}); });
  }
  // Primary source = ctls-data.json (the editable document). If fetch is unavailable
  // (opened as a file://) fall back to window.CTLS from the ctls-data.js script tag.
  // Every raw text this session has seen or written is kept so the pre-save
  // conflict check can tell "someone else published" from "that's ours".
  // ctls-data.js is a snapshot baked in at build time and is NOT republished by the
  // merge bot, so it drifts stale the moment anyone publishes. Falling back to it
  // silently is dangerous in edit mode: the editor would load a stale catalogue,
  // apply a change, and save the whole stale file back over everyone else's work.
  // (The merge bot's baseRev check would reject it, but only after the editor lost
  // their work.) So record when we fall back, and edit mode refuses to run on it.
  var staleFallback=false;
  function loadData(){
    if(!window.fetch){ staleFallback=true; return Promise.resolve(window.CTLS||null); }
    return fetch('ctls-data.json',{cache:'no-store'})
      .then(function(r){ if(!r.ok) throw new Error('http '+r.status); return r.text(); })
      .then(function(t){ knownRaws.push(canon(t)); return JSON.parse(t); })
      .catch(function(){ staleFallback=true; return window.CTLS||null; });
  }
  loadData().then(function(data){
    if(data){ for(var k in data){ if(Object.prototype.hasOwnProperty.call(data,k)) D[k]=data[k]; } }
    ['topics','resources','tasks','glossary','edges'].forEach(function(k){ if(!D[k]) D[k]=[]; });
    boot();
  });
})();
</script>
